<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./Age-Calculator.css" />
    <link rel="icon" href="./images/favicon-32x32.png" />
    <title>Age Calculator</title>
  </head>
  <body>
    <main>
      <section class="sect-one">
        <form>
          <h1>DAY</h1>
          <input type="text" placeholder="24" />
        </form>

        <form>
          <h1>MONTH</h1>
          <input type="text" placeholder="09" />
        </form>

        <form>
          <h1>YEAR</h1>
          <input type="text" placeholder="1984" />
        </form>
      </section>

      <section class="sect-two">
        <hr class="hr-one" />
        <div>
          <img src="./images/icon-arrow.svg" alt="arrow" />
        </div>

        <hr class="hr-two" />
      </section>

      <footer>
        <p><span>38</span>years</p>
        <p><span>3</span>months</p>
        <p><span>26</span>days</p>
      </footer>
    </main>
  </body>
</html>
